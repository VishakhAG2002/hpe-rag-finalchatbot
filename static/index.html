<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPE OneView Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='80' height='12' rx='2' fill='%2301A982'/></svg>">
</head>
<body>
    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="hpe-logo">
                    <svg class="logo-mark" viewBox="0 0 100 45" xmlns="http://www.w3.org/2000/svg">
                        <text x="0" y="36" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700" letter-spacing="-1">
                            <tspan fill="#ffffff">HP</tspan><tspan fill="#01A982">E</tspan>
                        </text>
                    </svg>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-title">Chat History</div>
                <div class="chat-history-list" id="chat-history-list">
                    <!-- Dynamically populated -->
                </div>
                <button class="new-chat-btn" id="new-chat-btn">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/>
                    </svg>
                    New Chat
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="stats-display" id="stats-display">Loading...</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button class="mobile-toggle" id="mobile-toggle">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/>
                        </svg>
                    </button>
                    <h1>HPE OneView Assistant</h1>
                </div>
                <div class="status-badge" id="status-badge">
                    <span class="status-dot"></span>
                    <span id="status-text">Connecting...</span>
                </div>
            </header>

            <div class="chat-area" id="chat-area">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                    </div>
                    <h2>HPE OneView Assistant</h2>
                    <p>I can help you find information across HPE OneView documentation, release notes, and REST API reference.</p>
                    <div class="suggestion-chips">
                        <button class="chip" data-query="What is HPE OneView and what can it do?">What is HPE OneView?</button>
                        <button class="chip" data-query="What are the known issues in HPE OneView 11.1?">Known Issues in v11.1</button>
                        <button class="chip" data-query="How do I create and manage server profiles?">Server Profiles</button>
                        <button class="chip" data-query="What REST API endpoints are available for networking?">Networking APIs</button>
                    </div>
                </div>

                <!-- Messages Container -->
                <div class="messages-container" id="messages-container"></div>

                <!-- Typing Indicator -->
                <div class="typing-indicator" id="typing-indicator">
                    <div class="bot-avatar">H</div>
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea
                        id="message-input"
                        placeholder="Ask about HPE OneView documentation..."
                        rows="1"
                        maxlength="2000"
                    ></textarea>
                    <button class="send-btn" id="send-btn" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Press Enter to send, Shift+Enter for new line</p>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
